<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Intro SE331</title>
    <!-- Import Styles -->
    <link rel="stylesheet" href="./assets/styles.css" />
    <!-- Import Vue.js -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>

<body>
    <div id="app">
        <div class="nav-bar"></div>
        <div class="cart">Cart({{cart}})</div>
        <div class="product-display">
            <div class="product-container">
                <div class="product-image">
                    <img :src="image" :class="{'out-of-stock-image': !inStock}">
                </div>
            </div>
        </div>
        <div class="product-info">
            <h1>
                <a :href="link">{{title}}</a>
            </h1>
            <h2 v-if="onSale">{{displaySale}}</h2>
            <h3>{{productDescription}}</h3>
            <p v-if="inventory > 10 && inStock">In stock</p>
            <p v-else-if="inventory <= 10 && inventory > 0 && inStock">Almost out of stock</p>
            <p v-else>Out of stock</p>
            <ul>
                <li v-for="detail in details">{{detail}}</li>
            </ul>
            <div v-for="(variant,index) in variants" :key="variant.id"
            @mouseover="updateVariant(index)"
            class="color-circle" :style="{backgroundColor: variant.color}">
            </div>
            <ul class="sizeList">
                <li v-for="size in sizes">{{size}}</li>
            </ul>
            <button class="button" :disabled='!inStock' @click="addToCart" :class="{disabledButton: !inStock}">Add to cart</button>
            <button class="button" @click="toggleStockStatus">Toggle Stock status</button>
            <button class="button" @click="toggleSale">Toggle Sale</button>
        </div>
    </div>

    <!-- Import Js -->
    <script src="./main.js"></script>
</body>

</html>
